<!DOCTYPE html>
<html>
<head>
    <title>Student Performance Predictor</title>
</head>
<body>
    <h2>Enter Student Details</h2>

    <form action="/predict" method="post">
        Study Time: <input type="number" name="studytime"><br><br>
        Failures: <input type="number" name="failures"><br><br>
        Absences: <input type="number" name="absences"><br><br>

        G2 Score: <input type="number" name="G2"><br><br>

        <input type="submit" value="Predict">
    </form>
</body>
</html>
